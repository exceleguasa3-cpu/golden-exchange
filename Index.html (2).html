    <script>
        // 1. Initialize Chart
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:PAXGUSDT", "interval": "1",
            "timezone": "Etc/UTC", "theme": "dark", "style": "1",
            "container_id": "tv_chart", "hide_side_toolbar": false
        });

        // 2. Connect to Exchange Engine (Backend)
        const exchangeSocket = new WebSocket('ws://localhost:3000');
        let currentPrice = 0;

        // 3. Connect to Market Data (Binance)
        const marketSocket = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
        
        marketSocket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            currentPrice = parseFloat(data.c);
            const priceEl = document.getElementById('live-price');
            priceEl.innerText = `$${currentPrice.toFixed(2)}`;
            priceEl.style.color = parseFloat(data.P) >= 0 ? '#4ade80' : '#f87171';
        };

        function placeOrder(type) {
            const qty = document.getElementById('order-qty').value;
            const orderData = { type, amount: qty, price: currentPrice };
            exchangeSocket.send(JSON.stringify(orderData));
        }

        exchangeSocket.onmessage = (event) => {
            const response = JSON.parse(event.data);
            if (response.status === 'SUCCESS') {
                document.getElementById('balance').innerText = `$${response.portfolio.balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                document.getElementById('holdings').innerText = `${response.portfolio.gold.toFixed(2)} oz`;
                logOrder('SUCCESS', 'Order filled at market price');
            } else {
                logOrder('ERROR', response.reason);
            }
        };

        function logOrder(status, msg) {
            const log = document.getElementById('order-log');
            const entry = document.createElement('div');
            entry.className = status === 'ERROR' ? 'text-red-500' : 'text-zinc-400';
            entry.innerText = `> [${new Date().toLocaleTimeString()}] ${status}: ${msg}`;
            log.prepend(entry);
        }

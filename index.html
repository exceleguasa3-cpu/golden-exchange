<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subway Gold: Master Build</title>
    <style>
        :root { --gold: #d4af37; --neon: #00f2ff; }
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Arial Black', sans-serif; color: var(--gold); }
        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 40%, #1a1a1a 0%, #000 100%); }
        canvas { display: block; }
        
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 5; }
        .stat { background: rgba(0,0,0,0.9); border: 2px solid var(--gold); padding: 10px 20px; border-radius: 10px; box-shadow: 0 0 15px var(--gold); min-width: 100px; text-align: center; }

        #powerup-timer { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 20px; color: var(--neon); display: none; text-shadow: 0 0 10px var(--neon); }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        h1 { font-size: 4rem; text-shadow: 0 0 30px var(--gold); margin: 0; }
        .btn { padding: 20px 50px; background: var(--gold); border: none; color: #000; font-weight: bold; font-size: 1.5rem; cursor: pointer; border-radius: 50px; margin-top: 20px; box-shadow: 0 0 20px var(--gold); transition: 0.2s; }
        .btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="stat">SCORE<br><span id="score">0</span></div>
        <div class="stat">BEST<br><span id="best">0</span></div>
        <div class="stat">GOLD<br><span id="coins">0</span></div>
    </div>
    
    <div id="powerup-timer">POWERUP ACTIVE</div>
    <canvas id="gameCanvas"></canvas>

    <div id="overlay">
        <h1 id="title">SUBWAY GOLD</h1>
        <button class="btn" onclick="startGame()">START RUN</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const coinsEl = document.getElementById('coins');
const timerUI = document.getElementById('powerup-timer');

let active = false;
let score = 0;
let coins = 0;
let speed = 15;
let frame = 0;
let worldZ = 0; 
let highScore = localStorage.getItem('goldMasterHi') || 0;
bestEl.innerText = highScore;

// Player & Powerups
const player = { 
    lane: 1, x: 0, targetX: 0, y: 0, vY: 0, jumping: false, 
    hasBoard: false, 
    hasJetpack: false, jetTimer: 0,
    hasShoes: false, shoeTimer: 0
};

// Guard & Dog
const guard = { x: -200, visible: true, chaseTimer: 0 };

let obstacles = [];
const lanes = [];

function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    lanes[0] = canvas.width * 0.25;
    lanes[1] = canvas.width * 0.5;
    lanes[2] = canvas.width * 0.75;
    player.targetX = lanes[1];
    player.x = lanes[1];
}

window.addEventListener('keydown', (e) => {
    if(!active) return;
    if(e.key === 'ArrowLeft' && player.lane > 0) player.lane--;
    if(e.key === 'ArrowRight' && player.lane < 2) player.lane++;
    
    // Jump Logic (Improved for Shoes)
    if((e.key === 'ArrowUp' || e.key === ' ') && !player.jumping && !player.hasJetpack) {
        player.vY = player.hasShoes ? -28 : -20; // Jump higher with shoes
        player.jumping = true;
    }
    player.targetX = lanes[player.lane];
});

function spawn() {
    if(frame % 35 === 0) {
        const r = Math.random();
        let type = 'TRAIN';
        if(r < 0.2) type = 'COIN';
        else if(r < 0.24) type = 'BOARD';
        else if(r < 0.27) type = 'JETPACK';
        else if(r < 0.30) type = 'SHOES';
        
        if(player.hasJetpack) type = 'COIN';

        obstacles.push({ lane: Math.floor(Math.random()*3), z: 2000, type: type });
    }
}

function update() {
    if(!active) return;
    frame++;
    worldZ += speed; 
    score += Math.floor(speed/10);
    scoreEl.innerText = score;

    player.x += (player.targetX - player.x) * 0.15;

    // Guard Movement Logic
    if (frame > 120 && guard.visible && guard.chaseTimer <= 0) {
        guard.x -= 8; 
        if (guard.x < -300) guard.visible = false;
    }
    if (guard.chaseTimer > 0) {
        guard.chaseTimer--;
        guard.visible = true;
        guard.x += (player.x - 130 - guard.x) * 0.1;
    }

    // Powerup Timers
    if (player.hasJetpack) {
        player.jetTimer--;
        if (player.y > -350) player.y -= 15; // Smooth Ascent
        timerUI.style.display = 'block';
        timerUI.innerText = "JETPACK: " + Math.ceil(player.jetTimer/60);
        if(player.jetTimer <= 0) {
            player.hasJetpack = false;
            timerUI.style.display = 'none';
            player.vY = 2; // Start falling
        }
    } else if (player.hasShoes) {
        player.shoeTimer--;
        timerUI.style.display = 'block';
        timerUI.innerText = "SNEAKERS: " + Math.ceil(player.shoeTimer/60);
        if(player.shoeTimer <= 0) {
            player.hasShoes = false;
            timerUI.style.display = 'none';
        }
    }

    // Physics (Gravity)
    if (!player.hasJetpack && (player.y < 0 || player.jumping)) {
        player.y += player.vY;
        player.vY += 1.0; 
        if(player.y >= 0) { 
            player.y = 0; 
            player.jumping = false; 
            player.vY = 0;
        }
    }

    obstacles.forEach((o, i) => {
        o.z -= speed;
        if(o.z < 80 && o.z > -80 && o.lane === player.lane) {
            const playerHeight = player.hasJetpack ? -350 : player.y;
            const hitObstacle = (o.type === 'TRAIN' && playerHeight > -60);
            
            if(hitObstacle) {
                if (player.hasBoard) {
                    player.hasBoard = false;
                    obstacles.splice(i, 1);
                    guard.chaseTimer = 200;
                } else {
                    endGame();
                }
            } else if(o.type === 'COIN') {
                coins += 10; coinsEl.innerText = coins; obstacles.splice(i, 1);
            } else if(o.type === 'BOARD') {
                player.hasBoard = true; obstacles.splice(i, 1);
            } else if(o.type === 'JETPACK') {
                player.hasJetpack = true; player.jetTimer = 450; obstacles.splice(i, 1);
            } else if(o.type === 'SHOES') {
                player.hasShoes = true; player.shoeTimer = 500; obstacles.splice(i, 1);
            }
        }
        if(o.z < -200) obstacles.splice(i, 1);
    });

    spawn();
    speed += 0.002;
}

function draw() {
    ctx.save();
    // Screen Tilt based on steering
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate((player.x - player.targetX) * 0.0003);
    ctx.translate(-canvas.width/2, -canvas.height/2);

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const horizon = canvas.height * 0.35;
    const fov = 450;

    // 1. 3D Tracks
    ctx.strokeStyle = '#d4af37';
    ctx.lineWidth = 4;
    [0, 1, 2].forEach(l => {
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, horizon);
        ctx.lineTo(lanes[l], canvas.height);
        ctx.stroke();
    });

    // 2. Track Sleepers (Motion Effect)
    ctx.strokeStyle = 'rgba(212, 175, 55, 0.2)';
    for(let i=0; i<20; i++) {
        let lineZ = (worldZ + i*120) % 2000;
        let s = fov / (fov + (2000 - lineZ));
        let y = horizon + (canvas.height - horizon) * s;
        ctx.beginPath();
        ctx.moveTo(canvas.width/2 - (canvas.width * s), y);
        ctx.lineTo(canvas.width/2 + (canvas.width * s), y);
        ctx.stroke();
    }

    // 3. Obstacles
    obstacles.sort((a,b) => b.z - a.z);
    obstacles.forEach(o => {
        const s = fov / (fov + o.z);
        const x = canvas.width/2 + (lanes[o.lane] - canvas.width/2) * s;
        const yBase = player.hasJetpack && o.type === 'COIN' ? horizon - 150 : horizon;
        const y = yBase + (canvas.height - horizon) * s;
        
        ctx.font = `${200 * s}px serif`;
        ctx.textAlign = 'center';
        let spr = o.type==='TRAIN'?'🚆':(o.type==='BOARD'?'🛹':(o.type==='JETPACK'?'🚀':(o.type==='SHOES'?'👟':'🟡')));
        ctx.fillText(spr, x, y);
    });

    // 4. Guard & Player
    if (guard.visible) {
        ctx.font = '55px serif';
        ctx.fillText('👮‍♂️🐕', guard.x, canvas.height - 60);
    }

    ctx.font = '85px serif';
    ctx.shadowBlur = 20; ctx.shadowColor = 'gold';
    if (player.hasJetpack) {
        ctx.fillText('🚀', player.x, canvas.height - 70 + player.y);
    } else if (player.hasBoard) {
        ctx.fillText('🛹', player.x, canvas.height - 35 + player.y);
    }
    if (player.hasShoes) ctx.shadowColor = '#00f2ff';
    ctx.fillText('🏃‍♂️', player.x, canvas.height - 70 + player.y);
    ctx.shadowBlur = 0;

    ctx.restore();
    if(active) requestAnimationFrame(() => { update(); draw(); });
}

function startGame() {
    document.getElementById('overlay').style.display = 'none';
    active = true; score = 0; speed = 15; obstacles = [];
    player.lane = 1; player.y = 0; player.hasBoard = false; player.hasJetpack = false; player.hasShoes = false;
    guard.x = lanes[1] - 130; guard.visible = true; guard.chaseTimer = 0;
    frame = 0; init(); draw();
}

function endGame() {
    active = false;
    if(score > highScore) {
        highScore = score;
        localStorage.setItem('goldMasterHi', highScore);
        bestEl.innerText = highScore;
    }
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('title').innerText = "BUSTED";
}

init();
</script>
</body>
</html>
